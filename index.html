<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="식단 분석기"/>
  <meta name="theme-color" content="#0C0C0E"/>
  <link rel="manifest" href="/Diet-pwa/manifest.json"/>
  <link rel="apple-touch-icon" href="/Diet-pwa/icon-192.png"/>
  <title>식단 분석기</title>
  <style>
    :root {
      --carb:#FF6B35; --protein:#4A9EFF; --fat:#B76EFF;
      --bg:#0C0C0E; --card:#1C1C1E; --card2:#2C2C2E; --border:#3A3A3C;
      --text:#F2F2F7; --muted:#8E8E93; --success:#30D158; --warn:#FFD60A; --danger:#FF453A;
      --sat: env(safe-area-inset-top,44px);
      --sab: env(safe-area-inset-bottom,24px);
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    html, body { height:100%; background:var(--bg); color:var(--text); font-family:-apple-system,'SF Pro Display','SF Pro Text',sans-serif; overscroll-behavior:none; -webkit-overflow-scrolling:touch; }
    #root { min-height:100svh; display:flex; flex-direction:column; }
    button { font-family:inherit; -webkit-appearance:none; appearance:none; cursor:pointer; border:none; background:none; color:inherit; }
    button:active { opacity:.7; transform:scale(.97); }
    input { font-family:inherit; -webkit-appearance:none; appearance:none; outline:none; border:none; background:none; color:inherit; }
    ::-webkit-scrollbar { display:none; }
    ::-webkit-inner-spin-button,::-webkit-outer-spin-button { -webkit-appearance:none; }
    .card { background:var(--card); border-radius:20px; border:1px solid var(--border); }
    .card2 { background:var(--card2); border-radius:14px; }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
    @keyframes slideIn { from{opacity:0;transform:translateX(18px)} to{opacity:1;transform:translateX(0)} }
    .fade-up { animation:fadeUp .4s cubic-bezier(.16,1,.3,1) both }
    .slide-in { animation:slideIn .35s cubic-bezier(.16,1,.3,1) both }

    /* Nav */
    #nav { position:sticky; top:0; z-index:100; background:var(--bg); border-bottom:1px solid var(--border);
           display:flex; align-items:center; padding:6px 16px 12px; gap:8px; }
    #nav .nav-title { flex:1; text-align:center; font-size:17px; font-weight:700; }
    #nav button { font-size:16px; font-weight:600; color:var(--carb); min-width:44px; padding:6px 0; }

    /* Screens */
    .screen { padding:16px 16px 60px; display:flex; flex-direction:column; gap:14px; }

    /* Inputs */
    .inp { width:100%; background:var(--card2); border:1.5px solid var(--border); border-radius:12px;
           padding:13px 16px; color:var(--text); font-size:16px; }
    .inp:focus { border-color:var(--carb); }
    .inp-sm { width:80px; background:var(--card2); border:1.5px solid var(--border); border-radius:10px;
              padding:8px 10px; color:var(--text); font-size:16px; font-weight:700; text-align:right; }

    /* Buttons */
    .btn-primary { width:100%; padding:18px; background:var(--carb); border-radius:16px;
                   color:#fff; font-size:17px; font-weight:700; }
    .btn-success { width:100%; padding:18px; background:var(--success); border-radius:16px;
                   color:#fff; font-size:17px; font-weight:700; }
    .btn-ghost { width:100%; padding:14px; background:var(--card); border:1px solid var(--border);
                 border-radius:14px; color:var(--muted); font-size:15px; }

    /* Tab switcher */
    .tabs { display:flex; background:var(--card2); border-radius:12px; padding:3px; gap:2px; }
    .tab { flex:1; padding:9px; border-radius:10px; font-size:14px; font-weight:600; color:var(--muted); text-align:center; transition:.2s; }
    .tab.active { background:var(--card); color:var(--text); }

    /* Calendar day cell */
    .day-cell { border-radius:10px; display:flex; flex-direction:column; align-items:center;
                gap:3px; padding:7px 2px 9px; cursor:pointer; border:1px solid transparent; }
    .day-cell:active { opacity:.6; }

    /* Macro ring placeholder */
    .ring-wrap { position:relative; margin:0 auto; flex-shrink:0; }
    .ring-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; }

    /* Progress bar */
    .prog-track { height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
    .prog-fill { height:100%; border-radius:3px; transition:width .8s cubic-bezier(.16,1,.3,1); }

    /* Nutrient row */
    .nutr-row { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--border); }
    .nutr-row:last-child { border-bottom:none; }

    /* Meal card */
    .meal-card { padding:12px 16px; }

    /* Install banner */
    #install-banner { display:none; position:fixed; bottom:calc(var(--sab) + 8px); left:16px; right:16px;
                       background:#1C1C1E; border:1px solid var(--border); border-radius:16px;
                       padding:14px 16px; z-index:200; align-items:center; gap:12px; }
    #install-banner.show { display:flex; }
  </style>
</head>
<body>
<div id="root"></div>

<div id="install-banner">
  <div style="font-size:28px">📲</div>
  <div style="flex:1">
    <div style="font-size:14px;font-weight:700;color:var(--text)">홈 화면에 추가하기</div>
    <div style="font-size:12px;color:var(--muted);margin-top:2px">Safari → 공유 → 홈 화면에 추가</div>
  </div>
  <button onclick="document.getElementById('install-banner').classList.remove('show')"
    style="color:var(--muted);font-size:20px;padding:4px">✕</button>
</div>

<script>
// ── Helpers ────────────────────────────────────────────────────────────────────
const C = { carb:"#FF6B35", protein:"#4A9EFF", fat:"#B76EFF", bg:"#0C0C0E", card:"#1C1C1E", card2:"#2C2C2E", border:"#3A3A3C", text:"#F2F2F7", muted:"#8E8E93", success:"#30D158", warn:"#FFD60A", danger:"#FF453A" };

const todayStr = () => new Date().toISOString().slice(0,10);
const fmt = d => { const [y,m,day]=d.split("-"); return `${y}.${m}.${day}`; };
const addDays = (d,n) => { const dt=new Date(d); dt.setDate(dt.getDate()+n); return dt.toISOString().slice(0,10); };
const diffDays = (a,b) => Math.round((new Date(b)-new Date(a))/86400000);

// ── Persistent storage via localStorage ────────────────────────────────────────
const STORAGE_KEY = "diet-app-v1";
function loadDB() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { logs:{}, settings:null }; }
  catch { return { logs:{}, settings:null }; }
}
function saveDB(db) { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); }
let DB = loadDB();

// ── Goal calc ──────────────────────────────────────────────────────────────────
const calcGoals = w => {
  w = Number(w); if(!w||w<=0) return null;
  const cal = Math.round(w*26);
  const prot = Math.round(w*2.2);
  const fat = Math.round((cal/4)/9);
  const carb = Math.round((cal - prot*4 - fat*9)/4);
  return { goalCalories:cal, goalProtein:prot, goalFat:fat, goalCarbs:carb };
};

// ── SVG helpers ────────────────────────────────────────────────────────────────
function svgMacroRing(carb, protein, fat, calories, size=160) {
  const total = carb+protein+fat; if(!total) return "";
  const stroke=18, r=(size-stroke)/2, circ=2*Math.PI*r, cx=size/2, cy=size/2, gap=3;
  const carbD=Math.max(0,(carb/total)*circ-gap);
  const protD=Math.max(0,(protein/total)*circ-gap);
  const fatD=Math.max(0,(fat/total)*circ-gap);
  const seg=(color,dash,off)=>`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${off}" stroke-linecap="round"/>`;
  return `<div class="ring-wrap" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${C.border}" stroke-width="${stroke}"/>
      ${seg(C.carb,carbD,0)}${seg(C.protein,protD,-(carbD+gap))}${seg(C.fat,fatD,-(carbD+gap+protD+gap))}
    </svg>
    <div class="ring-center">
      <span style="font-size:10px;color:${C.muted}">칼로리</span>
      <span style="font-size:${size>140?28:18}px;font-weight:800;line-height:1">${calories}</span>
      <span style="font-size:10px;color:${C.muted}">kcal</span>
    </div>
  </div>`;
}

function svgWeightChart(days, logs) {
  const pts = days.map(d=>({d,w:logs[d]?.weight??null})).filter(p=>p.w!==null);
  if(pts.length<2) return `<div style="text-align:center;padding:24px 0;color:${C.muted};font-size:13px">체중을 2일 이상 입력하면 그래프가 나타나요 📈</div>`;
  const n=days.length;
  const step = n<=14?1:n<=30?3:n<=90?7:14;
  const xLabel = d => { const dt=new Date(d); return step>=7?`${dt.getMonth()+1}/${dt.getDate()}`:`${dt.getDate()}일`; };
  const ws=pts.map(p=>p.w), minW=Math.min(...ws), maxW=Math.max(...ws), rangeW=maxW-minW||1;
  const PAD={t:10,b:28,l:36,r:12}, W=340, H=140, gW=W-PAD.l-PAD.r, gH=H-PAD.t-PAD.b;
  const xOf=d=>{const i=days.indexOf(d);return PAD.l+(i/Math.max(days.length-1,1))*gW;};
  const yOf=w=>PAD.t+gH-((w-minW)/rangeW)*gH;
  const linePts=pts.map(p=>`${xOf(p.d)},${yOf(p.w)}`).join(" ");
  const fillPts=[`${xOf(pts[0].d)},${H-PAD.b}`,...pts.map(p=>`${xOf(p.d)},${yOf(p.w)}`),`${xOf(pts[pts.length-1].d)},${H-PAD.b}`].join(" ");
  const xLabels=days.map((d,i)=>({d,i})).filter(({i})=>i%step===0||i===days.length-1);
  const yTicks=[minW,(minW+maxW)/2,maxW].map(v=>Math.round(v*10)/10);
  return `<svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible">
    <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${C.protein}" stop-opacity=".35"/>
      <stop offset="100%" stop-color="${C.protein}" stop-opacity=".02"/>
    </linearGradient></defs>
    ${yTicks.map(t=>`<line x1="${PAD.l}" y1="${yOf(t)}" x2="${W-PAD.r}" y2="${yOf(t)}" stroke="${C.border}" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="${PAD.l-4}" y="${yOf(t)+4}" text-anchor="end" font-size="9" fill="${C.muted}">${t}</text>`).join("")}
    <polygon points="${fillPts}" fill="url(#wg)"/>
    <polyline points="${linePts}" fill="none" stroke="${C.protein}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${pts.map(p=>`<circle cx="${xOf(p.d)}" cy="${yOf(p.w)}" r="3.5" fill="${C.protein}" stroke="${C.bg}" stroke-width="1.5"/>`).join("")}
    ${xLabels.map(({d})=>`<text x="${xOf(d)}" y="${H-6}" text-anchor="middle" font-size="9" fill="${C.muted}">${xLabel(d)}</text>`).join("")}
    <line x1="${PAD.l}" y1="${H-PAD.b}" x2="${W-PAD.r}" y2="${H-PAD.b}" stroke="${C.border}" stroke-width="1"/>
  </svg>`;
}

// ── App state ──────────────────────────────────────────────────────────────────
let state = {
  screen: DB.settings ? "calendar" : "setup",
  selectedDate: todayStr(),
  analyzeTab: "photo",   // photo | manual
  settings: DB.settings || { startDate:todayStr(), endDate:addDays(todayStr(),6), goalCalories:2000, goalCarbs:250, goalProtein:150, goalFat:65, targetWeight:"" },
  logs: DB.logs || {},
  // transient
  setupForm: null,
  analyzePending: null,   // result waiting to be saved
  manualForm: { foodName:"", calories:"", carbs:"", protein:"", fat:"" },
  imagePreview: null,
  imageBase64: null,
  imageMime: "image/jpeg",
  loading: false,
  error: null,
};

function setState(patch) { Object.assign(state, patch); render(); }

// ── Render engine ──────────────────────────────────────────────────────────────
function render() {
  const root = document.getElementById("root");
  const safeTop = `max(env(safe-area-inset-top),44px)`;
  const sab = `env(safe-area-inset-bottom,24px)`;

  const screens = {
    setup: renderSetup,
    calendar: renderCalendar,
    day: renderDay,
    analyze: renderAnalyze,
  };

  const TITLES = { setup:"설정", calendar:"식단 캘린더", day:fmt(state.selectedDate), analyze:"식사 추가" };

  const navLeft = () => {
    if(state.screen==="setup") return `<div style="min-width:44px"></div>`;
    if(state.screen==="calendar") return `<button onclick="go('setup')">⚙️</button>`;
    return `<button onclick="goBack()">‹ 뒤로</button>`;
  };
  const navRight = () => {
    if(state.screen==="day" && state.selectedDate<=todayStr())
      return `<button onclick="go('analyze')" style="font-size:22px;min-width:44px;text-align:right">+</button>`;
    return `<div style="min-width:44px"></div>`;
  };

  root.innerHTML = `
    <div style="height:${safeTop}; background:var(--bg)"></div>
    <nav id="nav">
      ${navLeft()}
      <div class="nav-title">${TITLES[state.screen]}</div>
      ${navRight()}
    </nav>
    <div id="screen-wrap" class="${state.screen==='setup'?'fade-up':'slide-in'}" style="padding-bottom:${sab}">
      ${screens[state.screen]()}
    </div>
  `;
  attachEvents();
}

function go(screen) { setState({screen}); window.scrollTo(0,0); }
function goBack() {
  const map = { day:"calendar", analyze:"day", setup:"calendar" };
  go(map[state.screen]||"calendar");
}

// ── SETUP SCREEN ───────────────────────────────────────────────────────────────
function renderSetup() {
  const f = state.settings;
  const days = diffDays(f.startDate, f.endDate)+1;
  const presets = [{l:"1주",n:7},{l:"2주",n:14},{l:"1달",n:30},{l:"3달",n:90}];
  const sug = f.targetWeight ? calcGoals(f.targetWeight) : null;

  return `<div class="screen">
    <!-- Period -->
    <div class="card" style="padding:16px 20px">
      <div style="font-size:13px;color:var(--muted);margin-bottom:12px">기간 설정</div>
      <div style="display:flex;gap:8px;margin-bottom:16px">
        ${presets.map(p=>`<button class="tab ${days===p.n?'active':''}" onclick="applyPreset(${p.n})" style="flex:1;border-radius:10px;border:1px solid ${days===p.n?'var(--carb)':'var(--border)'};background:${days===p.n?'var(--carb)':'var(--card2)'};color:${days===p.n?'#fff':'var(--muted)'}">${p.l}</button>`).join("")}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:5px">시작일</div>
          <input type="date" id="startDate" value="${f.startDate}" class="inp" style="font-size:14px;color-scheme:dark" oninput="updateSetting('startDate',this.value)"/>
        </div>
        <div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:5px">종료일</div>
          <input type="date" id="endDate" value="${f.endDate}" class="inp" style="font-size:14px;color-scheme:dark" oninput="updateSetting('endDate',this.value)"/>
        </div>
      </div>
      <div style="margin-top:12px;text-align:center;font-size:13px;color:var(--muted)">
        총 <span style="color:var(--carb);font-weight:700">${days>0?days:"-"}일</span> 기간
      </div>
    </div>

    <!-- Target weight -->
    <div class="card" style="padding:16px 20px">
      <div style="font-size:13px;color:var(--muted);margin-bottom:4px">목표 체중으로 자동 계산</div>
      <div style="font-size:11px;color:var(--border);margin-bottom:14px">체중을 입력하면 최적 영양소를 제안해드려요</div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:${sug?'14px':'0'}">
        <div style="flex:1;position:relative">
          <input type="number" id="targetWeight" value="${f.targetWeight||''}" placeholder="예) 65" class="inp" style="font-size:20px;font-weight:700;padding-right:44px;color-scheme:dark" oninput="updateSetting('targetWeight',this.value)"/>
          <span style="position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--muted)">kg</span>
        </div>
        ${sug?`<button onclick="applyGoals()" style="padding:13px 16px;background:var(--carb);border-radius:12px;color:#fff;font-size:14px;font-weight:700">적용</button>`:""}
      </div>
      ${sug?`<div class="card2" style="padding:14px 16px">
        <div style="font-size:12px;color:var(--muted);margin-bottom:10px">🎯 <span style="color:var(--carb);font-weight:700">${f.targetWeight}kg</span> 기준 추천</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          ${[["칼로리",sug.goalCalories,"kcal",C.warn],["탄수화물",sug.goalCarbs,"g",C.carb],["단백질",sug.goalProtein,"g",C.protein],["지방",sug.goalFat,"g",C.fat]].map(([l,v,u,c])=>`
          <div style="background:var(--card);border-radius:10px;padding:10px 12px">
            <div style="font-size:11px;color:var(--muted);margin-bottom:4px">${l}</div>
            <span style="font-size:18px;font-weight:800;color:${c}">${v}</span>
            <span style="font-size:11px;color:var(--muted)"> ${u}</span>
          </div>`).join("")}
        </div>
      </div>`:""}
    </div>

    <!-- Manual goals -->
    <div class="card" style="padding:16px 20px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div style="font-size:13px;color:var(--muted)">하루 목표 영양소</div>
        <div style="font-size:11px;color:var(--border)">직접 수정 가능</div>
      </div>
      ${[["칼로리 목표","goalCalories","kcal",C.warn,""],["탄수화물 목표","goalCarbs","g",C.carb,"나머지 kcal÷4"],["단백질 목표","goalProtein","g",C.protein,f.targetWeight?`${f.targetWeight}×2.2`:""],["지방 목표","goalFat","g",C.fat,"칼로리÷4÷9"]].map(([label,key,unit,color,hint],i,arr)=>`
      <div style="padding-bottom:${i<arr.length-1?14:0}px;margin-bottom:${i<arr.length-1?14:0}px;border-bottom:${i<arr.length-1?'1px solid var(--border)':'none'}">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-size:14px">${label}</div>
            ${hint?`<div style="font-size:11px;color:var(--muted);margin-top:2px">${hint}</div>`:""}
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            <input type="number" value="${f[key]}" class="inp-sm" style="color:${color};color-scheme:dark" oninput="updateSetting('${key}',+this.value)"/>
            <span style="font-size:12px;color:var(--muted);min-width:24px">${unit}</span>
          </div>
        </div>
      </div>`).join("")}
    </div>

    <button class="btn-primary" onclick="saveSettings()" style="opacity:${days>0?1:.4}">식단 관리 시작하기 →</button>
  </div>`;
}

function updateSetting(key, val) {
  state.settings = { ...state.settings, [key]: val };
  render();
}
function applyPreset(n) { updateSetting("endDate", addDays(state.settings.startDate, n-1)); }
function applyGoals() {
  const g = calcGoals(state.settings.targetWeight);
  if(!g) return;
  state.settings = { ...state.settings, ...g };
  render();
}
function saveSettings() {
  const days = diffDays(state.settings.startDate, state.settings.endDate)+1;
  if(days<=0) return;
  DB.settings = state.settings;
  saveDB(DB);
  go("calendar");
}

// ── CALENDAR SCREEN ────────────────────────────────────────────────────────────
function renderCalendar() {
  const { startDate, endDate, goalCalories } = state.settings;
  const totalDays = diffDays(startDate, endDate)+1;
  const today = todayStr();
  const days = Array.from({length:totalDays},(_,i)=>addDays(startDate,i));
  const logs = state.logs;

  // group by month
  const months = [];
  let cur = null;
  days.forEach(d => {
    const dt = new Date(d), mKey = `${dt.getFullYear()}-${dt.getMonth()}`;
    if(!cur||cur.key!==mKey) { cur={key:mKey,year:dt.getFullYear(),month:dt.getMonth()+1,days:[]}; months.push(cur); }
    cur.days.push(d);
  });

  const getScore = d => {
    const log=logs[d]; if(!log?.meals?.length) return null;
    const tot=log.meals.reduce((a,m)=>a+(m.calories||0),0), ratio=tot/goalCalories;
    if(ratio<0.5) return "low"; if(ratio>1.3) return "over";
    const avg=log.meals.reduce((a,m)=>a+(m.healthScore||5),0)/log.meals.length;
    return avg>=7?"great":avg>=4?"ok":"poor";
  };
  const dotColor = { great:C.success, ok:C.warn, poor:C.danger, low:C.muted, over:C.danger };

  const allLogged = days.filter(d=>logs[d]?.meals?.length);
  const totalCal = allLogged.reduce((a,d)=>a+logs[d].meals.reduce((b,m)=>b+(m.calories||0),0),0);
  const avgCal = allLogged.length?Math.round(totalCal/allLogged.length):0;
  const weightDays = days.filter(d=>logs[d]?.weight);
  const weights = weightDays.map(d=>logs[d].weight);
  const firstW=weights[0], lastW=weights[weights.length-1];
  const wDelta = (firstW&&lastW)?Math.round((lastW-firstW)*10)/10:null;

  const monthHTML = months.map(m => {
    const firstDow = new Date(m.days[0]).getDay();
    const padded = [...Array(firstDow).fill(null), ...m.days];
    const weeks = [];
    for(let i=0;i<padded.length;i+=7) { const w=padded.slice(i,i+7); while(w.length<7)w.push(null); weeks.push(w); }

    const weeksHTML = weeks.map((week,wi) => `
      ${wi>0?`<div style="height:1px;background:var(--card2);margin:3px 0"></div>`:""}
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">
        ${week.map(d => {
          if(!d) return `<div style="padding:8px 2px"></div>`;
          const score=getScore(d), isToday=d===today, isFuture=d>today, isPast=d<today;
          const hasMeals=logs[d]?.meals?.length, hasWeight=logs[d]?.weight;
          const dayNum=new Date(d).getDate();
          return `<button onclick="selectDay('${d}')" style="border-radius:10px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 2px 9px;background:${isToday?'var(--carb)':hasMeals?'var(--card2)':'transparent'};border:1px solid ${isToday?'var(--carb)':hasMeals?'var(--border)':'transparent'};opacity:${isFuture?.3:1}">
            <span style="font-size:13px;font-weight:${isToday?800:500};color:${isToday?'#fff':isPast&&!hasMeals?'var(--muted)':'var(--text)'}">${dayNum}</span>
            <div style="display:flex;gap:2px;align-items:center">
              ${score?`<div style="width:5px;height:5px;border-radius:50%;background:${dotColor[score]}"></div>`:""}
              ${hasWeight?`<div style="width:5px;height:5px;border-radius:50%;background:${C.protein}"></div>`:""}
            </div>
          </button>`;
        }).join("")}
      </div>`).join("");

    return `<div class="card" style="padding:14px 12px">
      <div style="font-size:15px;font-weight:700;margin-bottom:10px;padding-left:4px">${m.year}년 ${m.month}월</div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px">
        ${["일","월","화","수","목","금","토"].map(d=>`<div style="text-align:center;font-size:10px;color:var(--muted);font-weight:600">${d}</div>`).join("")}
      </div>
      ${weeksHTML}
      ${m===months[months.length-1]?`<div style="display:flex;gap:10px;justify-content:center;margin-top:10px;flex-wrap:wrap">
        ${[[C.success,"훌륭"],[C.warn,"보통"],[C.danger,"나쁨"],[C.muted,"미달"],[C.protein,"체중"]].map(([c,l])=>`<div style="display:flex;align-items:center;gap:3px"><div style="width:5px;height:5px;border-radius:50%;background:${c}"></div><span style="font-size:10px;color:var(--muted)">${l}</span></div>`).join("")}
      </div>`:""}
    </div>`;
  }).join("");

  return `<div class="screen">
    <!-- Summary -->
    <div class="card" style="padding:14px 18px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:12px;color:var(--muted)">기간</div>
          <div style="font-size:14px;font-weight:700;margin-top:2px">${fmt(startDate)} – ${fmt(endDate)}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">총 ${totalDays}일 · ${allLogged.length}일 기록</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:12px;color:var(--muted)">평균 칼로리</div>
          <div style="font-size:22px;font-weight:800;color:var(--warn)">${avgCal||"-"}</div>
          <div style="font-size:11px;color:var(--muted)">kcal/일</div>
        </div>
      </div>
    </div>

    ${monthHTML}

    <!-- Stats -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      ${[["🔥","총 칼로리",totalCal.toLocaleString(),"kcal"],["📅","기록한 날",allLogged.length,"일"]].map(([icon,label,val,unit])=>`
      <div class="card" style="padding:14px 16px">
        <div style="font-size:20px;margin-bottom:4px">${icon}</div>
        <div style="font-size:11px;color:var(--muted)">${label}</div>
        <div style="font-size:22px;font-weight:800;line-height:1.2">${val}</div>
        <div style="font-size:11px;color:var(--muted)">${unit}</div>
      </div>`).join("")}
    </div>

    <!-- Weight chart -->
    <div class="card" style="padding:16px 16px 12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-size:14px;font-weight:700">⚖️ 체중 변화</div>
        ${wDelta!==null?`<div style="font-size:13px;font-weight:700;color:${wDelta<0?C.success:wDelta>0?C.danger:C.muted}">${wDelta>0?"+":""}${wDelta}kg</div>`:""}
      </div>
      ${svgWeightChart(days, logs)}
      ${weightDays.length>=2?`<div style="display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:var(--muted)"><span>시작 ${firstW}kg</span><span>현재 ${lastW}kg</span></div>`:""}
    </div>

    <button class="btn-ghost" onclick="go('setup')">⚙️ 기간 / 목표 설정 변경</button>
  </div>`;
}

function selectDay(d) { setState({selectedDate:d}); go("day"); }

// ── DAY SCREEN ─────────────────────────────────────────────────────────────────
function renderDay() {
  const d = state.selectedDate, log = state.logs[d]||{meals:[],weight:null};
  const meals = log.meals||[], isToday=d===todayStr(), isFuture=d>todayStr();
  const s = state.settings;

  const totCal=meals.reduce((a,m)=>a+(m.calories||0),0);
  const totCarb=meals.reduce((a,m)=>a+(m.carbs||0),0);
  const totProt=meals.reduce((a,m)=>a+(m.protein||0),0);
  const totFat=meals.reduce((a,m)=>a+(m.fat||0),0);
  const macroTot=totCarb+totProt+totFat;
  const carbPct=macroTot?Math.round((totCarb/macroTot)*100):0;
  const protPct=macroTot?Math.round((totProt/macroTot)*100):0;
  const fatPct=macroTot?Math.round((totFat/macroTot)*100):0;

  const prog=(val,max,color)=>`<div class="prog-track"><div class="prog-fill" style="width:${Math.min(100,max>0?(val/max)*100:0)}%;background:${color}"></div></div>`;

  const weightVal = log.weight||"";

  return `<div class="screen">
    <!-- Weight input -->
    ${!isFuture?`<div class="card" style="padding:14px 18px">
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px">⚖️ 공복 체중 (아침)</div>
      <div style="display:flex;gap:10px;align-items:center">
        <div style="flex:1;position:relative">
          <input type="number" step="0.1" id="weightInp" value="${weightVal}" placeholder="예) 65.4" class="inp" style="font-size:20px;font-weight:700;padding-right:44px;color-scheme:dark"/>
          <span style="position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--muted)">kg</span>
        </div>
        <button onclick="saveWeight()" style="padding:12px 18px;background:${log.weight?'var(--success)':'var(--protein)'};border-radius:12px;color:#fff;font-size:14px;font-weight:700">
          ${log.weight?"✓ 저장됨":"저장"}
        </button>
      </div>
      ${log.weight?`<div style="margin-top:8px;font-size:12px;color:var(--muted)">기록: <span style="color:var(--protein);font-weight:700">${log.weight}kg</span></div>`:""}
    </div>`:""}

    <!-- Macro summary -->
    ${meals.length>0?`<div class="card" style="padding:20px">
      <div style="font-size:13px;color:var(--muted);margin-bottom:14px">오늘 총 영양소</div>
      <div style="display:flex;gap:16px;align-items:center">
        ${svgMacroRing(totCarb,totProt,totFat,totCal,130)}
        <div style="flex:1;display:flex;flex-direction:column;gap:10px">
          ${[["탄수화물",totCarb,carbPct,C.carb,s.goalCarbs],["단백질",totProt,protPct,C.protein,s.goalProtein],["지방",totFat,fatPct,C.fat,s.goalFat]].map(([l,g,pct,color,goal])=>`
          <div>
            <div style="display:flex;justify-content:space-between;margin-bottom:3px">
              <span style="font-size:12px;color:${color}">${l}</span>
              <span style="font-size:12px;color:var(--muted)">${g}g/${goal}g</span>
            </div>${prog(g,goal,color)}
          </div>`).join("")}
          <div>
            <div style="display:flex;justify-content:space-between;margin-bottom:3px">
              <span style="font-size:12px;color:var(--warn)">칼로리</span>
              <span style="font-size:12px;color:var(--muted)">${totCal}/${s.goalCalories}kcal</span>
            </div>${prog(totCal,s.goalCalories,C.warn)}
          </div>
        </div>
      </div>
    </div>`:""}

    <!-- Meal list -->
    ${meals.length>0?`<div style="display:flex;flex-direction:column;gap:8px">
      <div style="font-size:13px;color:var(--muted);padding-left:4px">식사 기록</div>
      ${meals.map((m,i)=>`<div class="card meal-card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div style="font-size:15px;font-weight:700">${m.foodName}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px">${m.servingSize||"직접 입력"}</div>
          </div>
          <div style="text-align:right;display:flex;align-items:center;gap:8px">
            <div>
              <div style="font-size:16px;font-weight:800;color:var(--warn)">${m.calories}</div>
              <div style="font-size:10px;color:var(--muted)">kcal</div>
            </div>
            <button onclick="deleteMeal(${i})" style="color:var(--danger);font-size:18px;padding:4px;opacity:.6">✕</button>
          </div>
        </div>
        <div style="display:flex;gap:10px;margin-top:10px">
          ${[[C.carb,"탄",m.carbs+"g"],[C.protein,"단",m.protein+"g"],[C.fat,"지",m.fat+"g"]].map(([c,l,v])=>`<div style="display:flex;align-items:center;gap:3px"><div style="width:6px;height:6px;border-radius:50%;background:${c}"></div><span style="font-size:11px;color:var(--muted)">${l} ${v}</span></div>`).join("")}
          ${m.healthScore?`<div style="margin-left:auto;font-size:11px;color:${m.healthScore>=7?C.success:m.healthScore>=4?C.warn:C.danger}">★ ${m.healthScore}/10</div>`:""}
        </div>
        ${m.tips?`<div style="margin-top:8px;font-size:12px;color:var(--muted);border-top:1px solid var(--border);padding-top:8px">💡 ${m.tips}</div>`:""}
      </div>`).join("")}
    </div>`:""}

    ${meals.length===0&&!isFuture?`<div class="card" style="padding:32px;text-align:center">
      <div style="font-size:40px;margin-bottom:10px">🍽️</div>
      <div style="font-size:15px;color:var(--muted)">아직 기록된 식사가 없어요</div>
    </div>`:""}
    ${isFuture?`<div class="card" style="padding:32px;text-align:center">
      <div style="font-size:40px;margin-bottom:10px">📅</div>
      <div style="font-size:15px;color:var(--muted)">아직 오지 않은 날이에요</div>
    </div>`:""}

    ${!isFuture?`<button class="btn-primary" onclick="go('analyze')">+ 식사 추가하기</button>`:""}
  </div>`;
}

function saveWeight() {
  const val = parseFloat(document.getElementById("weightInp")?.value);
  if(isNaN(val)||val<=0) return;
  const d = state.selectedDate;
  const prev = state.logs[d]||{meals:[],weight:null};
  state.logs[d] = {...prev, weight:val};
  DB.logs = state.logs; saveDB(DB);
  render();
}

function deleteMeal(idx) {
  const d = state.selectedDate;
  const prev = state.logs[d]||{meals:[]};
  const meals = prev.meals.filter((_,i)=>i!==idx);
  state.logs[d] = {...prev, meals};
  DB.logs = state.logs; saveDB(DB);
  render();
}

// ── ANALYZE SCREEN ─────────────────────────────────────────────────────────────
function renderAnalyze() {
  const tab = state.analyzeTab;
  const res = state.analyzePending;
  const mf = state.manualForm;

  const macroTotal = res ? res.carbs+res.protein+res.fat : 0;
  const carbPct = macroTotal?Math.round((res.carbs/macroTotal)*100):0;
  const protPct = macroTotal?Math.round((res.protein/macroTotal)*100):0;
  const fatPct  = macroTotal?Math.round((res.fat/macroTotal)*100):0;

  return `<div class="screen">
    <!-- Tab switcher -->
    <div class="tabs">
      <button class="tab ${tab==='photo'?'active':''}" onclick="setState({analyzeTab:'photo',analyzePending:null,imagePreview:null,error:null})">📷 사진 분석</button>
      <button class="tab ${tab==='manual'?'active':''}" onclick="setState({analyzeTab:'manual',analyzePending:null,error:null})">✏️ 직접 입력</button>
    </div>

    ${tab==='photo' ? renderPhotoTab(res, carbPct, protPct, fatPct) : renderManualTab(mf)}
  </div>`;
}

    return `<div class="fade-up" style="display:flex;flex-direction:column;gap:12px">

        <div style="font-size:11px;color:var(--muted);margin-bottom:3px">인식된 음식</div>

        <div style="font-size:12px;color:var(--muted);margin-top:2px">${res.servingSize} 기준</div>
        <div style="margin-top:8px;display:flex;align-items:baseline;gap:4px">
          <span style="font-size:30px;font-weight:800;color:var(--warn)">${res.calories}</span>
          <span style="font-size:13px;color:var(--muted)">kcal</span>
        </div>
      </div>
      <div class="card" style="padding:16px 18px">
        <div style="font-size:12px;color:var(--muted);margin-bottom:14px">탄·단·지 비율</div>

        <div style="display:flex;gap:8px;margin-top:14px">
          ${[["탄수화물",res.carbs,carbPct,C.carb],["단백질",res.protein,protPct,C.protein],["지방",res.fat,fatPct,C.fat]].map(([l,g,p,c])=>`<div style="flex:1;background:var(--card2);border-radius:12px;padding:10px 6px;display:flex;flex-direction:column;align-items:center;gap:3px"><div style="width:7px;height:7px;border-radius:50%;background:${c}"></div><span style="font-size:17px;font-weight:800">${p}%</span><span style="font-size:11px;color:${c};font-weight:600">${l}</span><span style="font-size:10px;color:var(--muted)">${g}g</span></div>`).join("")}
        </div>
      </div>
      <div class="card" style="padding:4px 18px">
        ${[["식이섬유",res.fiber,"g"],["당류",res.sugar,"g"],["나트륨",res.sodium,"mg"],["콜레스테롤",res.cholesterol,"mg"]].map(([l,v,u],i,arr)=>`<div class="nutr-row" style="border-bottom:${i<arr.length-1?'1px solid var(--border)':'none'}"><span style="font-size:14px;color:var(--muted)">${l}</span><span style="font-size:14px;font-weight:600">${v} <span style="color:var(--muted);font-size:12px">${u}</span></span></div>`).join("")}

      <div class="card" style="padding:14px 18px;display:flex;flex-direction:column;gap:10px">

          <span style="font-size:20px;font-weight:800;color:${res.healthScore>=7?C.success:res.healthScore>=4?C.warn:C.danger}">${res.healthScore>=7?"🥗":res.healthScore>=4?"🍱":"🍔"} ${res.healthScore}/10</span>
        </div>
        <div style="background:var(--card2);border-radius:10px;padding:10px 12px;font-size:13px;color:var(--muted);line-height:1.6">💡 ${res.tips}</div>
      </div>
      <button class="btn-success" onclick="saveMeal()">✓ ${fmt(state.selectedDate)} 기록에 저장</button>
      <button class="btn-ghost" onclick="setState({analyzePending:null,imagePreview:null})">↩ 다시 찍기</button>
    </div>`;
  }

  return `
    <div onclick="triggerFileInput()" style="border-radius:20px;overflow:hidden;cursor:pointer;border:2px dashed ${img?'transparent':'var(--border)'};background:${img?'transparent':'var(--card)'};min-height:${img?'auto':'180px'};display:flex;align-items:center;justify-content:center;position:relative">
      ${img?`<img src="${img}" style="width:100%;display:block;max-height:240px;object-fit:cover;border-radius:18px"/>`:`<div style="text-align:center;padding:32px"><div style="font-size:44px;margin-bottom:10px">📸</div><div style="font-size:15px;font-weight:600;margin-bottom:4px">사진을 업로드하세요</div><div style="font-size:13px;color:var(--muted)">탭해서 선택</div></div>`}
    </div>
    <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none" onchange="handleFile(this)"/>
    ${img&&!state.loading?`<button class="btn-primary" onclick="analyzePhoto()">영양소 분석하기 →</button>`:""}
    ${state.loading?`<div class="card" style="padding:28px;text-align:center">
      <div style="width:40px;height:40px;border-radius:50%;border:3px solid var(--border);border-top:3px solid var(--carb);margin:0 auto 12px;animation:spin .8s linear infinite"></div>

        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
          ${[["탄수화물","mCarbs","carbs",C.carb],["단백질","mProtein","protein",C.protein],["지방","mFat","fat",C.fat]].map(([label,id,key,color])=>`
          <div>
            <div style="font-size:11px;color:${color};margin-bottom:5px;font-weight:600">${label}</div>
            <div style="position:relative">
              <input type="number" id="${id}" value="${mf[key]}" placeholder="0" class="inp" style="padding-right:22px;font-size:15px;font-weight:700;color:${color}" oninput="updateManual('${key}',+this.value)"/>
              <span style="position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--muted)">g</span>

    <!-- Preview -->
    ${canSave&&(mf.carbs||mf.protein||mf.fat)?`
    <div class="card" style="padding:14px 18px">

  </div>`;

// ── Event handlers ─────────────────────────────────────────────────────────────
function updateManual(key, val) {
  state.manualForm = {...state.manualForm, [key]: val};
  render();
}

function triggerFileInput() { document.getElementById("fileInput")?.click(); }

function handleFile(input) {
  const file = input.files[0];
  if(!file||!file.type.startsWith("image/")) return;
  state.imageMime = file.type||"image/jpeg";
  const reader = new FileReader();
  reader.onload = e => {
    state.imagePreview = e.target.result;
    state.imageBase64 = e.target.result.split(",")[1];
    state.analyzePending = null; state.error = null;
    render();
  };
  reader.readAsDataURL(file);
}

async function analyzePhoto() {
  if(!state.imageBase64) return;
  setState({loading:true, error:null});
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        model:"claude-sonnet-4-20250514", max_tokens:1000,
        messages:[{role:"user",content:[
          {type:"image",source:{type:"base64",media_type:state.imageMime,data:state.imageBase64}},
          {type:"text",text:`이 음식 사진을 분석해서 반드시 아래 JSON 형식으로만 응답해. 추가 설명 없이 JSON만 출력해.\n{"foodName":"음식 이름","servingSize":"1인분 기준","calories":숫자,"carbs":숫자,"protein":숫자,"fat":숫자,"fiber":숫자,"sugar":숫자,"sodium":숫자,"cholesterol":숫자,"healthScore":숫자,"tips":"영양 팁 한 줄"}`}
        ]}]
      })
    });
    const data = await res.json();
    const text = data.content?.map(b=>b.text||"").join("")||"";
    const parsed = JSON.parse(text.replace(/```json|```/g,"").trim());
    setState({loading:false, analyzePending:parsed});
  } catch {
    setState({loading:false, error:"분석에 실패했어요. 다시 시도해 주세요."});
  }
}

function saveMeal() {
  const meal = state.analyzePending; if(!meal) return;
  const d = state.selectedDate;
  const prev = state.logs[d]||{meals:[],weight:null};
  state.logs[d] = {...prev, meals:[...prev.meals, meal]};
  DB.logs = state.logs; saveDB(DB);
  state.analyzePending = null; state.imagePreview = null; state.imageBase64 = null;
  go("day");
}

function saveManualMeal() {
  const mf = state.manualForm;
  if(!mf.foodName||!mf.calories) return;
  const meal = {
    foodName: mf.foodName,
    servingSize: "직접 입력",
    calories: mf.calories||0,
    carbs: mf.carbs||0,
    protein: mf.protein||0,
    fat: mf.fat||0,
    fiber: 0, sugar: 0, sodium: 0, cholesterol: 0,
    healthScore: null, tips: null,
  };
  const d = state.selectedDate;
  const prev = state.logs[d]||{meals:[],weight:null};
  state.logs[d] = {...prev, meals:[...prev.meals, meal]};
  DB.logs = state.logs; saveDB(DB);
  state.manualForm = {foodName:"",calories:"",carbs:"",protein:"",fat:""};
  go("day");
}

function attachEvents() {
  // No delegation needed — onclick attrs handle everything
}

// ── Install banner (iOS Safari) ────────────────────────────────────────────────
function checkInstallable() {
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone;
  if(isIOS && !isStandalone) {
    setTimeout(()=>document.getElementById("install-banner")?.classList.add("show"), 2000);
  }
}

// ── Service Worker ─────────────────────────────────────────────────────────────
if("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/Diet-pwa/sw.js", {scope: "/Diet-pwa/"}).catch(()=>{});
}

// ── Boot ───────────────────────────────────────────────────────────────────────
render();
checkInstallable();
</script>
